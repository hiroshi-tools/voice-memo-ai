<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>音声メモ AI チャット</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1a2e;--ink2:#4a4a6a;--ink3:#8888a8;
  --bg:#f0f0f5;--card:#fff;
  --bubble-user:#3a6df0;--bubble-ai:#e8e8f0;
  --accent:#3a6df0;--accent2:#6c5ce7;
  --success:#27ae60;--danger:#e74c3c;--warn:#f39c12;
  --radius:16px;--radius-sm:10px;
  --font:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;
}
html{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--ink);font-size:15px;
  display:flex;flex-direction:column;-webkit-text-size-adjust:100%;
  height:100dvh;height:-webkit-fill-available;
  overflow:hidden}

.header{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;padding:12px 16px;display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0;
  box-shadow:0 2px 16px rgba(58,109,240,.25);z-index:50;
}
.header h1{font-size:17px;font-weight:700;display:flex;align-items:center;gap:6px}
.header-right{display:flex;gap:6px}
.hdr-btn{
  background:rgba(255,255,255,.18);border:none;color:#fff;
  width:40px;height:40px;border-radius:50%;font-size:18px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;transition:background .2s;
}
.hdr-btn:active{background:rgba(255,255,255,.35)}

.llm-bar{
  display:flex;gap:4px;padding:6px 12px;background:#fafaff;
  border-bottom:1px solid #e4e4ee;flex-shrink:0;align-items:center;
  font-size:12px;color:var(--ink3);
}
.llm-bar span.label{margin-right:4px;font-weight:600}
.llm-chip{
  padding:4px 10px;border-radius:14px;font-size:11px;font-weight:600;
  border:1.5px solid #e4e4ee;background:#fff;color:var(--ink3);cursor:pointer;
  transition:all .2s;-webkit-tap-highlight-color:transparent;
}
.llm-chip.active{border-color:var(--accent);background:rgba(58,109,240,.06);color:var(--accent)}
.llm-chip.disabled{opacity:.35;cursor:not-allowed}

.chat-area{
  flex:1;overflow-y:auto;padding:16px 12px 8px;
  display:flex;flex-direction:column;gap:12px;
  -webkit-overflow-scrolling:touch;
}
.msg{display:flex;gap:8px;max-width:88%;animation:fadeUp .25s ease}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.ai{align-self:flex-start}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px}
.msg.ai .msg-avatar{background:linear-gradient(135deg,var(--accent),var(--accent2))}
.msg.user .msg-avatar{background:#ddd}
.msg-bubble{padding:12px 16px;border-radius:var(--radius);line-height:1.7;font-size:14px;white-space:pre-wrap;word-break:break-word}
.msg.user .msg-bubble{background:var(--bubble-user);color:#fff;border-bottom-right-radius:4px}
.msg.ai .msg-bubble{background:var(--bubble-ai);color:var(--ink);border-bottom-left-radius:4px}
.msg.ai .msg-bubble .heading{font-weight:700;color:var(--accent)}
.msg.ai .msg-bubble .file-tag{display:inline-block;background:rgba(58,109,240,.1);color:var(--accent);padding:2px 8px;border-radius:6px;font-weight:700;font-size:13px;margin-bottom:4px}
.typing{display:flex;gap:4px;padding:8px 16px}
.typing span{width:8px;height:8px;border-radius:50%;background:var(--ink3);animation:bounce .6s infinite alternate}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{to{transform:translateY(-6px);opacity:.4}}
.sys-msg{text-align:center;font-size:12px;color:var(--ink3);padding:4px 0}

.input-area{
  flex-shrink:0;background:#fff;border-top:1px solid #e4e4ee;
  padding:8px 12px;
  padding-bottom:calc(8px + env(safe-area-inset-bottom, 0px));
  display:flex;align-items:flex-end;gap:8px;
}
.input-wrap{
  flex:1;display:flex;align-items:flex-end;
  background:#f5f5fa;border-radius:22px;padding:4px 4px 4px 14px;
  border:2px solid transparent;transition:border-color .2s;
}
.input-wrap:focus-within{border-color:var(--accent)}
.input-wrap textarea{
  flex:1;border:none;background:transparent;font-size:16px;
  font-family:var(--font);resize:none;line-height:1.4;
  max-height:80px;padding:6px 0;color:var(--ink);
}
.input-wrap textarea:focus{outline:none}
.input-wrap textarea::placeholder{color:var(--ink3);font-size:14px}
.mic-btn{
  width:40px;height:40px;border-radius:50%;border:none;
  background:transparent;font-size:22px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;-webkit-tap-highlight-color:transparent;transition:all .2s;
}
.mic-btn.recording{background:var(--danger);color:#fff;animation:micPulse 1.2s infinite}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,.3)}50%{box-shadow:0 0 0 10px rgba(231,76,60,0)}}
.send-btn{
  width:40px;height:40px;border-radius:50%;border:none;
  background:var(--accent);color:#fff;font-size:18px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;-webkit-tap-highlight-color:transparent;transition:all .15s;
}
.send-btn:disabled{background:#ccc;cursor:not-allowed}
.send-btn:active:not(:disabled){transform:scale(.92)}

.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;background:rgba(0,0,0,.4)}
.modal-overlay.show{display:flex;justify-content:center;align-items:flex-start;padding-top:50px}
.modal-card{
  background:#fff;border-radius:var(--radius);padding:24px 20px;
  width:92%;max-width:420px;max-height:80vh;overflow-y:auto;
  box-shadow:0 8px 40px rgba(0,0,0,.15);animation:fadeUp .25s ease;
}
.modal-card h2{font-size:18px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--ink2);margin-bottom:4px}
.field input{width:100%;padding:10px 12px;border:2px solid #e4e4ee;border-radius:var(--radius-sm);font-size:14px;font-family:var(--font)}
.field input:focus{outline:none;border-color:var(--accent)}
.field .hint{font-size:11px;color:var(--ink3);margin-top:3px}
.modal-actions{display:flex;gap:8px;margin-top:20px}
.modal-actions button{flex:1;padding:12px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer}
.btn-save{background:var(--accent);color:#fff}
.btn-cancel{background:#f0f0f5;color:var(--ink2)}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(80px);padding:10px 22px;border-radius:8px;font-size:13px;font-weight:600;z-index:200;transition:transform .3s ease;color:#fff;max-width:85%;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--success)}.toast.error{background:var(--danger)}.toast.info{background:var(--ink2)}

.welcome{text-align:center;padding:40px 20px;color:var(--ink3)}
.welcome .icon{font-size:48px;margin-bottom:12px}
.welcome .title{font-size:16px;font-weight:600;color:var(--ink2);margin-bottom:6px}
.welcome .sub{font-size:13px;line-height:1.6}
</style>
</head>
<body>

<div class="header">
  <h1>🎤 音声メモ AI</h1>
  <div class="header-right">
    <button class="hdr-btn" onclick="resetChat()" title="新しい会話">🔄</button>
    <button class="hdr-btn" onclick="openSettings()" title="設定">⚙️</button>
  </div>
</div>

<div class="llm-bar">
  <span class="label">AI:</span>
  <span class="llm-chip active" data-llm="gemini" onclick="selectLlm(this)">Gemini</span>
  <span class="llm-chip" data-llm="claude" onclick="selectLlm(this)">Claude</span>
  <span class="llm-chip" data-llm="openai" onclick="selectLlm(this)">OpenAI</span>
</div>

<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcome">
    <div class="icon">🎙️</div>
    <div class="title">音声メモ AI チャット</div>
    <div class="sub">🎤マイクボタンで話すか、テキストを入力してください。<br>AIが内容を自動判定→整理→確認→自動保存します。</div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrap">
    <textarea id="userInput" rows="1" placeholder="話した内容を入力、またはマイクで音声入力..." oninput="autoGrow(this);updateSendBtn()"></textarea>
  </div>
  <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>➤</button>
</div>

<div class="modal-overlay" id="settingsModal" onclick="if(event.target===this)closeSettings()">
  <div class="modal-card">
    <h2>⚙️ 接続設定</h2>
    <div class="field">
      <label>GAS API URL（必須）</label>
      <input type="text" id="sApiUrl" placeholder="https://script.google.com/macros/s/.../exec">
      <div class="hint">GASをデプロイして取得したWebアプリURL</div>
    </div>
    <div class="field">
      <label>API認証トークン</label>
      <input type="text" id="sApiToken" placeholder="GAS設定画面で設定したトークン">
      <div class="hint">GAS側と同じ値を入力（未設定なら空欄でOK）</div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSettings()">キャンセル</button>
      <button class="btn-save" onclick="doSaveLocalSettings()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
const LS_KEY = 'voiceMemoAI_settings';
function getUrlParams() {
  const p = new URLSearchParams(window.location.search);
  const r = {};
  if (p.get('api')) r.apiUrl = p.get('api');
  if (p.get('token')) r.apiToken = p.get('token');
  return r;
}
function getLocalSettings() {
  var ls = {};
  try { ls = JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch(e) {}
  var up = getUrlParams();
  if (up.apiUrl) ls.apiUrl = up.apiUrl;
  if (up.apiToken) ls.apiToken = up.apiToken;
  return ls;
}
function setLocalSettings(s) { try { localStorage.setItem(LS_KEY, JSON.stringify(s)); } catch(e) {} }

// ============================================================
const S = {
  llm: 'gemini',
  messages: [],
  rawTexts: [],
  lastAiContent: '',
  isProcessing: false,
  recognition: null,
  isRecording: false,
  serverSettings: {}
};

// ============================================================
async function callAPI(body) {
  const ls = getLocalSettings();
  if (!ls.apiUrl) throw new Error('GAS API URLが未設定です。⚙️設定から登録してください。');
  if (ls.apiToken) body.token = ls.apiToken;
  const res = await fetch(ls.apiUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(body)
  });
  const text = await res.text();
  let data;
  try { data = JSON.parse(text); } catch(e) { throw new Error('サーバー応答の解析に失敗'); }
  if (data.error) throw new Error(data.error);
  return data;
}

// ============================================================
window.addEventListener('DOMContentLoaded', async () => {
  const ls = getLocalSettings();
  if (ls.apiUrl) {
    try {
      S.serverSettings = await callAPI({ action: 'getSettings' });
      S.llm = S.serverSettings.defaultLlm || 'gemini';
      updateLlmUI();
    } catch(e) { console.warn('サーバー接続失敗:', e.message); }
  }
});

// ============================================================
function selectLlm(el) {
  if (el.classList.contains('disabled')) { showToast('このAIのキーが未設定です','error'); return; }
  document.querySelectorAll('.llm-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  S.llm = el.dataset.llm;
}
function updateLlmUI() {
  const ss = S.serverSettings;
  document.querySelectorAll('.llm-chip').forEach(chip => {
    const llm = chip.dataset.llm;
    const has = (llm==='gemini'&&ss.hasGemini)||(llm==='claude'&&ss.hasClaude)||(llm==='openai'&&ss.hasOpenai);
    chip.classList.toggle('disabled', !has);
  });
  const def = document.querySelector('.llm-chip[data-llm="'+S.llm+'"]');
  if (def && !def.classList.contains('disabled')) {
    document.querySelectorAll('.llm-chip').forEach(c=>c.classList.remove('active'));
    def.classList.add('active');
  }
}

// ============================================================
function addBubble(role, text) {
  document.getElementById('welcome')?.remove();
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const avatar = role === 'ai' ? '🤖' : '👤';
  let content;
  if (role === 'ai') {
    content = text
      .replace(/^(📂\s*保存先[：:].+)/gm, '<span class="file-tag">$1</span>')
      .replace(/^(【.+?】)/gm, '<span class="heading">$1</span>');
  } else {
    content = esc(text);
  }
  div.innerHTML = '<div class="msg-avatar">'+avatar+'</div><div class="msg-bubble">'+content+'</div>';
  area.appendChild(div);
  scrollBottom();
}
function addSysMsg(text) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'sys-msg';
  div.textContent = text;
  area.appendChild(div);
  scrollBottom();
}
function showTyping() {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg ai'; div.id = 'typingInd';
  div.innerHTML = '<div class="msg-avatar">🤖</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  area.appendChild(div);
  scrollBottom();
}
function hideTyping() { document.getElementById('typingInd')?.remove(); }
function scrollBottom() { const a = document.getElementById('chatArea'); requestAnimationFrame(()=>{a.scrollTop=a.scrollHeight}); }

// ============================================================
async function sendMessage() {
  const ta = document.getElementById('userInput');
  const text = ta.value.trim();
  if (!text || S.isProcessing) return;

  ta.value = ''; autoGrow(ta); updateSendBtn();
  addBubble('user', text);

  // 承認チェック → 自動保存
  if (S.lastAiContent && isApproval(text)) {
    doAutoSave();
    return;
  }

  S.rawTexts.push(text);
  S.messages.push({ role: 'user', content: text });
  S.isProcessing = true;
  showTyping();

  try {
    const data = await callAPI({ action: 'chat', messages: S.messages, llm: S.llm });
    hideTyping();
    S.isProcessing = false;
    S.messages.push({ role: 'assistant', content: data.reply });
    S.lastAiContent = data.reply;
    addBubble('ai', data.reply);
  } catch(err) {
    hideTyping();
    S.isProcessing = false;
    addBubble('ai', '⚠️ エラー: ' + err.message);
  }
}

function isApproval(t) {
  const s = t.replace(/\s/g,'').toLowerCase();
  return ['はい','ok','おk','オッケー','おっけー','大丈夫','だいじょうぶ','いいです','いいよ',
    '問題ない','もんだいない','送って','保存して','よろしい','オーケー','yes','了解','りょうかい']
    .some(w => s.includes(w));
}

// ============================================================
async function doAutoSave() {
  addSysMsg('💾 自動保存中...');
  S.isProcessing = true;

  try {
    const result = await callAPI({
      action: 'autoSave',
      content: S.lastAiContent,
      rawText: S.rawTexts.join('\n')
    });

    S.isProcessing = false;
    const status = result.isNew ? '新規作成' : '追記';
    addBubble('ai', '✅ 保存しました！\n📄 ' + result.docName + '（' + status + '）\n🔗 ' + result.docUrl);

    // 会話状態をリセット（次の入力は新しいメモとして扱う）
    S.messages = [];
    S.rawTexts = [];
    S.lastAiContent = '';

    addSysMsg('── 新しいメモを入力できます ──');

    // Google Chatにも送信するか確認（Webhook設定済みの場合）
    if (S.serverSettings.hasChatWebhook) {
      addSysMsg('💬 Google Chatにも送信する場合は「チャットに送って」と入力');
    }
  } catch(err) {
    S.isProcessing = false;
    addBubble('ai', '⚠️ 保存エラー: ' + err.message);
  }
}

// ============================================================
function toggleMic() { S.isRecording ? stopMic() : startMic(); }

function startMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('音声認識非対応ブラウザです','error'); return; }

  if (!S.recognition) {
    const rec = new SR();
    rec.lang = 'ja-JP'; rec.continuous = true; rec.interimResults = true;
    rec.onresult = e => {
      const ta = document.getElementById('userInput');
      let fin = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) fin += e.results[i][0].transcript;
      }
      if (fin) { ta.value += fin; autoGrow(ta); updateSendBtn(); }
    };
    rec.onerror = e => {
      if (e.error==='no-speech' && S.isRecording) { try{rec.start();}catch(x){} }
      else if (e.error==='not-allowed') { showToast('マイク許可が必要です','error'); stopMic(); }
    };
    rec.onend = () => { if (S.isRecording) try{rec.start();}catch(x){} };
    S.recognition = rec;
  }

  try {
    S.recognition.start();
    S.isRecording = true;
    document.getElementById('micBtn').classList.add('recording');
    showRecBanner(true);
  } catch(e) { showToast('音声認識開始失敗','error'); }
}

function stopMic() {
  S.isRecording = false;
  if (S.recognition) try{S.recognition.stop();}catch(e){}
  document.getElementById('micBtn').classList.remove('recording');
  showRecBanner(false);
  showToast('録音を停止しました','success');
}

function showRecBanner(show) {
  let b = document.getElementById('recBanner');
  if (show) {
    if (!b) {
      b = document.createElement('div');
      b.id = 'recBanner';
      b.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#e74c3c;color:#fff;text-align:center;padding:6px;font-size:13px;font-weight:600;z-index:200;animation:micPulse 1.2s infinite';
      b.textContent = '🎤 録音中...マイクボタンで停止';
      document.body.appendChild(b);
    }
  } else {
    if (b) b.remove();
  }
}

// ============================================================
function openSettings() {
  const ls = getLocalSettings();
  document.getElementById('sApiUrl').value = ls.apiUrl || '';
  document.getElementById('sApiToken').value = ls.apiToken || '';
  document.getElementById('settingsModal').classList.add('show');
}
function closeSettings() { document.getElementById('settingsModal').classList.remove('show'); }

async function doSaveLocalSettings() {
  const s = {
    apiUrl: document.getElementById('sApiUrl').value.trim(),
    apiToken: document.getElementById('sApiToken').value.trim()
  };
  setLocalSettings(s);
  showToast('設定を保存しました','success');
  closeSettings();
  try {
    S.serverSettings = await callAPI({ action:'getSettings' });
    S.llm = S.serverSettings.defaultLlm || 'gemini';
    updateLlmUI();
    showToast('サーバー接続OK','success');
  } catch(e) { showToast('サーバー接続失敗: '+e.message,'error'); }
}

// ============================================================
function resetChat() {
  S.messages=[]; S.rawTexts=[]; S.lastAiContent='';
  document.getElementById('chatArea').innerHTML =
    '<div class="welcome" id="welcome"><div class="icon">🎙️</div><div class="title">音声メモ AI チャット</div>' +
    '<div class="sub">🎤マイクボタンで話すか、テキストを入力してください。<br>AIが内容を自動判定→整理→確認→自動保存します。</div></div>';
}

// ============================================================
function autoGrow(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px'}
function updateSendBtn(){document.getElementById('sendBtn').disabled=!document.getElementById('userInput').value.trim()}
function showToast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+(type||'info');t.offsetHeight;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function esc(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}

document.getElementById('userInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}});
</script>
</body>
</html>
